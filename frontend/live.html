  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🌊</div>

        <div class="title">River<br>Monitoring</div>
        <div class="sub">System v2.0</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="dashboard.html"><span class="nav-icon">⊞</span> Dashboard</a>
      <a class="nav-item active" href="live.html"><span class="nav-icon">〜</span> Live Monitoring</a>
      <a class="nav-item" href="map.html"><span class="nav-icon">📍</span> Hotspots Map</a>

          <div class="skeleton" style="height:14px;width:80px;margin:8px 0 12px;"></div>

            <div class="skeleton" style="height:64px;border-radius:10px;"></div>
            <div class="skeleton" style="height:64px;border-radius:10px;"></div>

            <div class="skeleton" style="height:64px;border-radius:10px;"></div>

            <div class="skeleton" style="height:18px;width:160px;"></div>

          </div>

            <div class="skeleton" style="height:64px;border-radius:10px;"></div>

            <div class="skeleton" style="height:40px;width:40px;border-radius:12px;"></div>
          </div>
          <div class="skeleton" style="height:14px;width:80px;margin:8px 0 12px;"></div>
          <div class="sensor-metrics">
            <div class="skeleton" style="height:64px;border-radius:10px;"></div>
            <div class="skeleton" style="height:64px;border-radius:10px;"></div>
            <div class="skeleton" style="height:64px;border-radius:10px;"></div>
            <div class="skeleton" style="height:64px;border-radius:10px;"></div>
          </div>
        </div>
