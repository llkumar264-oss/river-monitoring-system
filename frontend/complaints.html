<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complaints — River Monitoring System</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🌊</div>
      <div class="logo-text">
        <div class="title">River<br>Monitoring</div>
        <div class="sub">System v2.0</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="dashboard.html"><span class="nav-icon">⊞</span> Dashboard</a>
      <a class="nav-item" href="live.html"><span class="nav-icon">〜</span> Live Monitoring</a>
      <a class="nav-item" href="map.html"><span class="nav-icon">📍</span> Hotspots Map</a>
      <a class="nav-item active" href="complaints.html"><span class="nav-icon">💬</span> Complaints</a>
      <a class="nav-item" href="analytics.html"><span class="nav-icon">📊</span> Analytics</a>
      <a class="nav-item" href="alerts.html"><span class="nav-icon">🔔</span> Alerts</a>
    </nav>
    <div class="sidebar-bottom">
      <button class="citizen-btn" onclick="window.location.href='citizen.html'">Citizen Portal</button>
    </div>
  </aside>

  <div class="main">
    <header class="header">
      <div class="header-left">
        <div class="page-title">River Monitoring System</div>
        <div class="page-subtitle">Government Environmental Monitoring Platform</div>
      </div>
      <div class="header-right">
        <button class="dark-toggle" onclick="toggleDark()">🌙</button>
        <div class="user-info">
          <div class="user-name">Gov Admin</div>
          <div class="user-role">Administrator</div>
        </div>
        <div class="user-avatar">GA</div>
      </div>
    </header>

    <div class="content">
      <!-- Filters -->
      <div class="complaints-filters">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search by name, location, or ID..." oninput="filterComplaints()">
        </div>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
          <button class="filter-tab" onclick="setFilter('Pending', this)">Pending</button>
          <button class="filter-tab" onclick="setFilter('Verified', this)">Verified</button>
          <button class="filter-tab" onclick="setFilter('Resolved', this)">Resolved</button>
          <button class="filter-tab" onclick="setFilter('Rejected', this)">Rejected</button>
        </div>
      </div>

      <div class="complaints-layout">
        <div>
          <div id="complaintsList">
            <!-- Skeletons while loading -->
            <div class="complaint-card"><div class="skeleton" style="height:100px;"></div></div>
            <div class="complaint-card"><div class="skeleton" style="height:100px;"></div></div>
            <div class="complaint-card"><div class="skeleton" style="height:100px;"></div></div>
          </div>
        </div>
        <div>
          <div class="detail-panel" id="detailPanel">
            <div class="detail-empty">
              <div class="detail-icon">👁️</div>
              <p>Select a complaint to view details</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast">✅ Done</div>
  <script src="js/app.js"></script>
  <script src="js/complaints.js"></script>
</body>
</html>
